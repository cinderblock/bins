# Reference deploy: a self-hosted runner on the target host builds the app and
# flips an atomic release symlink. Register your runner with the `bins` label
# (or edit runs-on), and adapt APP_ROOT/SOCKET to your host layout.
name: Deploy

on:
  push:
    branches: [master]
  workflow_dispatch:

# Never let two deploys race on the host.
concurrency:
  group: deploy
  cancel-in-progress: false

env:
  APP_ROOT: /srv/bins
  SOCKET: /run/bins/bins.sock

jobs:
  deploy:
    runs-on: [self-hosted, bins]
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v5

      - name: Build (Bun)
        run: |
          set -euo pipefail
          bun install --frozen-lockfile
          bun run build

      - name: Stage release tree
        run: |
          set -euo pipefail
          REL="$APP_ROOT/releases/$GITHUB_SHA"
          rm -rf "$REL"
          mkdir -p "$REL"
          # Ready-to-run tree: the SPA build, the server entry and everything it
          # imports at runtime (api/, shared/, db/ incl. migrations — the app
          # auto-migrates on boot), and prod node_modules.
          cp -r build api shared db server.ts run package.json bun.lock "$REL"/
          chmod +x "$REL/run"
          # Stamp the build SHA so the running app reports which release it is
          # (server.ts serves it at /_version; the health check below verifies it).
          printf '%s' "$GITHUB_SHA" > "$REL/BUILD_SHA"
          # Prune to production dependencies inside the release dir.
          ( cd "$REL" && bun install --frozen-lockfile --production )

      - name: Activate + restart
        run: |
          set -euo pipefail
          # Atomic flip, then poke the supervisor's restart sentinel.
          ln -sfn "releases/$GITHUB_SHA" "$APP_ROOT/current"
          touch "$APP_ROOT/restart"

      - name: Wait for the NEW build to be serving
        # Poll /_version until it reports THIS commit's SHA — proving the
        # supervisor actually restarted into the new release (a plain 200 could
        # be the old process).
        env:
          EXPECT_SHA: ${{ github.sha }}
        run: |
          bun -e '
            const sock = process.env.SOCKET;
            const want = (process.env.EXPECT_SHA ?? "").trim();
            for (let i = 1; i <= 90; i++) {
              try {
                const r = await fetch("http://localhost/_version", { unix: sock });
                const got = (await r.text()).trim();
                if (r.status === 200 && got === want) {
                  console.log(`healthy: /_version -> ${got}`);
                  process.exit(0);
                }
                console.log(`/_version -> ${r.status} "${got.slice(0, 12)}" (want ${want.slice(0, 12)}, retry ${i})`);
              } catch (e) {
                console.log(`socket not ready (retry ${i}): ${e?.code ?? e?.message ?? e}`);
              }
              await new Promise((res) => setTimeout(res, 1000));
            }
            console.error(`::error::new build ${want} never came up on ${sock} within 90s — check the supervisor restart sentinel.`);
            process.exit(1);
          '

      - name: Prune old releases (keep last 5)
        if: always()
        run: |
          cd "$APP_ROOT/releases" 2>/dev/null || exit 0
          n=0
          for d in $(ls -1dt -- */ 2>/dev/null); do
            n=$((n + 1))
            [ "$n" -gt 5 ] && rm -rf -- "$d"
          done
          true
